<!DOCTYPE html>
<html>
<head>
    <title>ShadowApp 3D 🚗❄️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <script src="https://cdn.osmbuildings.org/OSMBuildings-Leaflet.js"></script>
    
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        #map { height: 65vh; width: 100%; background: #222; }
        .controls { height: 35vh; padding: 20px; text-align: center; background: #16213e; border-top: 2px solid #e94560; }
        input[type=range] { width: 90%; margin: 15px 0; accent-color: #e94560; }
        .btn-aparcar { background: #e94560; border: none; padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="controls">
        <h2 id="time-display">Hora: Ahora</h2>
        <input type="range" id="hour-slider" min="0" max="24" value="0" step="0.5">
        <p id="status-text">Cargando edificios...</p>
        <button class="btn-aparcar" onclick="alert('📍 Ubicación guardada')">📍 He aparcado aquí</button>
    </div>

    <script>
        const slider = document.getElementById('hour-slider');
        const timeDisplay = document.getElementById('time-display');
        const status = document.getElementById('status-text');

        function initApp(lat, lon) {
            // 1. Crear el mapa base de Leaflet
            const map = L.map('map').setView([lat, lon], 17);

            // 2. Usar un servidor de mapas que NO falle (sin el subdominio 'd')
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // 3. Cargar el motor de edificios 3D
            const osmb = new OSMBuildings(map).date(new Date()).load('https://{s}.data.osmbuildings.org/0.2/anonymous/tile/{z}/{x}/{y}.json');

            function update() {
                let t = new Date();
                t.setHours(t.getHours() + parseFloat(slider.value));
                timeDisplay.innerText = `En +${slider.value}h (${t.getHours()}:${t.getMinutes() < 10 ? '0' : ''}${t.getMinutes()})`;
                
                // Actualizar las sombras
                osmb.date(t);
            }

            slider.addEventListener('input', update);
            status.innerText = "¡Mapa 3D y sombras listos! 🚀";
        }

        navigator.geolocation.getCurrentPosition(
            pos => initApp(pos.coords.latitude, pos.coords.longitude),
            err => initApp(41.6176, 0.6201) // Lleida centro por defecto
        );
    </script>
</body>
</html>
