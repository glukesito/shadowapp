<!DOCTYPE html>
<html lang="es">
<head>
    <title>ShadowApp Pro v8.0 🌍🌦️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <style>
        :root { --accent: #e94560; --panel: #16213e; --text: #ffffff; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #0f3460; color: var(--text); overflow: hidden; }
        #map { height: 60vh; width: 100%; background: #1a1a2e; }
        
        /* Interfaz estilo Premium */
        .ui-panel { 
            height: 40vh; padding: 25px; background: var(--panel); 
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: space-around;
            box-sizing: border-box; border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 12px;
            font-size: 13px; margin-bottom: 10px;
        }

        .time-display { font-size: 32px; font-weight: 800; text-align: center; margin: 0; }
        
        input[type=range] { 
            width: 100%; height: 8px; border-radius: 5px; background: #0f3460;
            outline: none; -webkit-appearance: none; margin: 20px 0;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 25px; height: 25px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        .btn-main { 
            background: var(--accent); border: none; padding: 18px; 
            border-radius: 16px; color: white; font-weight: 700; 
            font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .btn-main:hover { background: #ff4d6d; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="ui-panel">
        <div class="status-bar">
            <span id="weather-tag">☀️ Despejado</span>
            <span id="sun-angle-tag">Elevación: --°</span>
        </div>

        <div>
            <h2 class="time-display" id="time-txt">--:--</h2>
            <input type="range" id="hour-slider" min="-12" max="12" value="0" step="0.1">
        </div>
        
        <button class="btn-main" onclick="saveCarPosition()">📍 FIJAR POSICIÓN DEL COCHE</button>
    </div>

    <script>
        let map, userPos = { lat: 41.6176, lon: 0.6201 };
        const slider = document.getElementById('hour-slider');
        const timeTxt = document.getElementById('time-txt');
        const sunAngleTag = document.getElementById('sun-angle-tag');

        function init() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/liberty', // Estilo más limpio
                center: [userPos.lon, userPos.lat],
                zoom: 18,
                pitch: 65,
                antialias: true
            });

            map.on('load', () => {
                // CAPA DE SOMBRAS (Mejorada para no "flotar")
                map.addLayer({
                    'id': 'shadows',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'paint': {
                        'fill-extrusion-color': '#000',
                        'fill-extrusion-opacity': 0.35,
                        'fill-extrusion-height': 0.1,
                        'fill-extrusion-base': 0
                    }
                });

                // CAPA DE EDIFICIOS 3D
                map.addLayer({
                    'id': 'buildings',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'paint': {
                        'fill-extrusion-color': '#cfd8dc',
                        'fill-extrusion-height': ['coalesce', ['get', 'height'], 15],
                        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], 0],
                        'fill-extrusion-opacity': 0.9
                    }
                });

                // VEGETACIÓN (Parques y árboles)
                map.addLayer({
                    'id': 'greenery',
                    'source': 'openmaptiles',
                    'source-layer': 'landuse',
                    'filter': ['in', 'class', 'park', 'forest', 'garden'],
                    'type': 'fill',
                    'paint': { 'fill-color': '#2e7d32', 'fill-opacity': 0.4 }
                }, 'shadows');

                update();
            });

            slider.addEventListener('input', update);
        }

        function update() {
            const date = new Date();
            date.setMinutes(date.getMinutes() + parseFloat(slider.value) * 60);
            
            const sun = SunCalc.getPosition(date, userPos.lat, userPos.lon);
            const alt = sun.altitude * (180 / Math.PI);
            
            // Reloj internacional
            timeTxt.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            sunAngleTag.innerText = `Sol: ${alt.toFixed(1)}°`;

            if (alt > 0) {
                // REDUCCIÓN DEL MULTIPLICADOR para evitar que la sombra "vuele"
                const shadowLen = Math.min(1 / Math.tan(sun.altitude), 4);
                const zoomFactor = Math.pow(2, 18 - map.getZoom());
                const mult = 12 * zoomFactor; // Ajustado para ser más realista

                const dx = Math.sin(sun.azimuth) * shadowLen * mult;
                const dy = Math.cos(sun.azimuth) * shadowLen * mult;

                map.setPaintProperty('shadows', 'fill-extrusion-opacity', 0.35);
                map.setPaintProperty('shadows', 'fill-extrusion-translate', [dx, dy]);
                
                // Color del edificio según el sol
                const light = Math.max(80, Math.min(255, alt * 5));
                map.setPaintProperty('buildings', 'fill-extrusion-color', `rgb(${light},${light},${light+20})`);
            } else {
                map.setPaintProperty('shadows', 'fill-extrusion-opacity', 0);
                map.setPaintProperty('buildings', 'fill-extrusion-color', '#1a1a2e');
            }
        }

        function saveCarPosition() {
            const center = map.getCenter();
            new maplibregl.Marker({ color: '#e94560' }).setLngLat(center).addTo(map);
            alert("Coche marcado. Analizando evolución de la sombra...");
        }

        navigator.geolocation.getCurrentPosition(
            p => { userPos = { lat: p.coords.latitude, lon: p.coords.longitude }; init(); },
            () => init()
        );
    </script>
</body>
</html>
