<!DOCTYPE html>
<html lang="es">
<head>
    <title>ShadowApp HUD 🚀</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <style>
        :root { --glass: rgba(22, 33, 62, 0.75); --accent: #e94560; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #000; overflow: hidden; }
        
        /* Mapa pantalla completa */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* HUD Superior: Clima y Datos */
        .hud-top {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 10; pointer-events: none;
        }
        .glass-pill {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 13px; font-weight: 500; pointer-events: auto;
        }

        /* HUD Inferior: Selector de Tiempo Estilo Shadowmap */
        .hud-bottom {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; z-index: 10;
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white;
        }

        .time-display { font-size: 28px; font-weight: 700; margin-bottom: 5px; display: block; }
        .sun-info { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }

        /* Slider Custom */
        input[type=range] {
            width: 100%; -webkit-appearance: none; background: transparent; margin: 20px 0;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%;
            background: var(--accent); cursor: pointer; margin-top: -9px;
            box-shadow: 0 0 15px var(--accent);
        }

        .btn-park {
            background: var(--accent); border: none; padding: 12px 25px;
            border-radius: 15px; color: white; font-weight: bold; width: 100%;
            cursor: pointer; margin-top: 10px; font-size: 14px;
        }

        /* Quitar logos molestos para limpieza visual */
        .maplibregl-ctrl-attrib { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-top">
        <div class="glass-pill" id="location-tag">Lleida, ES</div>
        <div class="glass-pill">☀️ Despejado</div>
    </div>
    
    <div class="hud-bottom">
        <span class="sun-info" id="sun-angle">Elevación: --°</span>
        <span class="time-display" id="time-txt">12:00</span>
        <input type="range" id="hour-slider" min="-12" max="12" value="0" step="0.1">
        <button class="btn-park" onclick="saveCar()">📍 MARCAR COCHE</button>
    </div>

    <script>
        let map, userPos = { lat: 41.6176, lon: 0.6201 };
        const slider = document.getElementById('hour-slider');
        const timeTxt = document.getElementById('time-txt');
        const sunAngleTag = document.getElementById('sun-angle');

        function init() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/dark', // Estilo oscuro tipo Shadowmap
                center: [userPos.lon, userPos.lat],
                zoom: 17,
                pitch: 65,
                antialias: true
            });

            map.on('load', () => {
                // CAPA DE SOMBRAS PROYECTADAS
                map.addLayer({
                    'id': 'shadows',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'paint': {
                        'fill-extrusion-color': '#000',
                        'fill-extrusion-opacity': 0.5,
                        'fill-extrusion-height': 0.1,
                        'fill-extrusion-base': 0
                    }
                });

                // CAPA DE EDIFICIOS 3D
                map.addLayer({
                    'id': 'buildings',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'paint': {
                        'fill-extrusion-color': '#334155', // Gris azulado Apple
                        'fill-extrusion-height': ['coalesce', ['get', 'height'], 15],
                        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], 0],
                        'fill-extrusion-opacity': 0.9
                    }
                });

                update();
            });

            slider.addEventListener('input', update);
        }

        function update() {
            const date = new Date();
            date.setMinutes(date.getMinutes() + parseFloat(slider.value) * 60);
            
            const sun = SunCalc.getPosition(date, userPos.lat, userPos.lon);
            const alt = sun.altitude * (180 / Math.PI);
            
            timeTxt.innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            sunAngleTag.innerText = `Sol: ${alt.toFixed(1)}°`;

            if (alt > 0) {
                // Cálculo de sombra realista "anclada"
                const shadowLen = Math.min(1 / Math.tan(sun.altitude), 5);
                const zoomAdjust = Math.pow(2, 17 - map.getZoom());
                const mult = 15 * zoomAdjust;

                const dx = Math.sin(sun.azimuth) * shadowLen * mult;
                const dy = Math.cos(sun.azimuth) * shadowLen * mult;

                map.setPaintProperty('shadows', 'fill-extrusion-opacity', 0.5);
                map.setPaintProperty('shadows', 'fill-extrusion-translate', [dx, dy]);
                
                // Color de edificio reactivo al sol
                const light = Math.max(50, Math.min(200, alt * 4));
                map.setPaintProperty('buildings', 'fill-extrusion-color', `rgb(${light},${light+10},${light+30})`);
            } else {
                map.setPaintProperty('shadows', 'fill-extrusion-opacity', 0);
                map.setPaintProperty('buildings', 'fill-extrusion-color', '#1a202c');
            }
        }

        function saveCar() {
            const center = map.getCenter();
            new maplibregl.Marker({ color: '#e94560' }).setLngLat(center).addTo(map);
        }

        navigator.geolocation.getCurrentPosition(
            p => { 
                userPos = { lat: p.coords.latitude, lon: p.coords.longitude }; 
                document.getElementById('location-tag').innerText = "Tu ubicación";
                init(); 
            },
            () => init()
        );
    </script>
</body>
</html>
