<!DOCTYPE html>
<html>
<head>
    <title>ShadowApp 3D 🚗❄️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <script src="https://cdn.osmbuildings.org/4.1.1/OSMBuildings.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; }
        #map { height: 65vh; width: 100%; background: #222; }
        .controls { height: 35vh; padding: 20px; text-align: center; box-sizing: border-box; }
        input[type=range] { width: 90%; margin: 20px 0; accent-color: #e94560; }
        .btn-aparcar { background: #e94560; border: none; padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="controls">
        <h2 id="time-display">Hora: Ahora</h2>
        <input type="range" id="hour-slider" min="0" max="24" value="0" step="0.5">
        <p id="status-text">Mueve el slider para ver el futuro</p>
        <button class="btn-aparcar" onclick="alert('Función de guardado: Próximamente')">📍 He aparcado aquí</button>
    </div>

    <script>
        const slider = document.getElementById('hour-slider');
        const timeDisplay = document.getElementById('time-display');
        let osmb;

        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;

            // 1. Inicializar el motor 3D
            osmb = new OSMBuildings({
                container: 'map',
                position: { latitude, longitude },
                zoom: 18,
                minZoom: 15,
                maxZoom: 20,
                effects: ['shadows'],
                attribution: '© Data OSMBuildings.org'
            });

            // 2. Añadir capa de mapa base
            osmb.addTiles('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

            // 3. Función para actualizar la posición del sol
            function updateTime() {
                let t = new Date();
                t.setHours(t.getHours() + parseFloat(slider.value));
                
                // Actualizar texto
                timeDisplay.innerText = slider.value == 0 ? "Hora: Ahora" : `En +${slider.value}h (${t.getHours()}:${t.getMinutes() < 10 ? '0' : ''}${t.getMinutes()})`;
                
                // El motor 3D necesita la fecha para calcular la sombra sola
                osmb.date(t);
            }

            slider.addEventListener('input', updateTime);
            updateTime(); // Ejecutar al inicio

        }, err => alert("Necesitamos GPS para ver las sombras de tu calle."));
    </script>
</body>
</html>
