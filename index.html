<!DOCTYPE html>
<html lang="es">
<head>
    <title>ShadowApp Pro v6.4 🚗🌳🅿️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        #map { height: 60vh; width: 100%; }
        .controls { height: 40vh; padding: 15px; text-align: center; background: #16213e; border-top: 3px solid #e94560; box-sizing: border-box; }
        input[type=range] { width: 100%; margin: 10px 0; accent-color: #e94560; }
        .btn-aparcar { background: #e94560; border: none; padding: 15px; border-radius: 30px; color: white; font-weight: bold; width: 100%; font-size: 16px; margin-top: 5px; }
        .legend { display: flex; justify-content: space-around; font-size: 12px; margin-bottom: 10px; }
        .legend-item { display: flex; align-items: center; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="controls">
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#2ecc71"></span> Parking Cubierto</div>
            <div class="legend-item"><span class="dot" style="background:#27ae60"></span> Árboles</div>
        </div>
        
        <h2 id="time-display" style="margin:0">Hora</h2>
        <input type="range" id="hour-slider" min="0" max="24" value="0" step="0.5">
        
        <p id="sun-angle" style="margin:5px 0; font-size: 13px; color: #f1c40f;">Ángulo del sol: --°</p>
        
        <button class="btn-aparcar" onclick="marcarAparcamiento()">📍 He aparcado aquí</button>
    </div>

    <script>
        const slider = document.getElementById('hour-slider');
        const timeDisplay = document.getElementById('time-display');
        const sunAngleTxt = document.getElementById('sun-angle');
        let map;

        function initMap(lat, lon) {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/bright',
                center: [lon, lat],
                zoom: 18,
                pitch: 60,
                antialias: true
            });

            map.on('load', () => {
                // 1. CAPA DE PARKINGS CUBIERTOS (Sombra garantizada)
                map.addLayer({
                    'id': 'parkings-cubiertos',
                    'source': 'openmaptiles',
                    'source-layer': 'transportation',
                    'filter': ['all', ['==', 'class', 'parking']], // Aquí filtramos parkings
                    'type': 'fill',
                    'paint': {
                        'fill-color': '#2ecc71', 
                        'fill-opacity': 0.4
                    }
                });

                // 2. CAPA DE ÁRBOLES (Puntos verdes)
                map.addLayer({
                    'id': 'arboles',
                    'source': 'openmaptiles',
                    'source-layer': 'landuse',
                    'filter': ['==', 'class', 'park'], // Usamos parques como referencia de vegetación
                    'type': 'fill',
                    'paint': {
                        'fill-color': '#27ae60',
                        'fill-opacity': 0.3
                    }
                });

                // 3. CAPA DE SOMBRAS EDIFICIOS (En el suelo)
                map.addLayer({
                    'id': 'shadows-ground',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'paint': {
                        'fill-extrusion-color': '#000',
                        'fill-extrusion-opacity': 0.5,
                        'fill-extrusion-height': 0.1,
                        'fill-extrusion-base': 0
                    }
                });

                // 4. CAPA DE EDIFICIOS 3D
                map.addLayer({
                    'id': '3d-buildings',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'paint': {
                        'fill-extrusion-color': '#aaa',
                        'fill-extrusion-height': ['get', 'render_height'],
                        'fill-extrusion-base': ['get', 'render_min_height'],
                        'fill-extrusion-opacity': 0.9
                    }
                });

                actualizarSombras(lat, lon);
            });

            slider.addEventListener('input', () => actualizarSombras(lat, lon));
        }

        function actualizarSombras(lat, lon) {
            let t = new Date();
            t.setHours(t.getHours() + parseFloat(slider.value));
            const sun = SunCalc.getPosition(t, lat, lon);
            const altitudeDeg = sun.altitude * (180 / Math.PI);
            
            timeDisplay.innerText = `+${slider.value}h (${t.getHours()}:${t.getMinutes() < 10 ? '0' : ''}${t.getMinutes()})`;
            sunAngleTxt.innerText = `Elevación del sol: ${altitudeDeg.toFixed(1)}°`;

            if (sun.altitude > 0) {
                let shadowFactor = 1 / Math.tan(sun.altitude);
                shadowFactor = Math.min(shadowFactor, 5); 

                const multiplier = 20; 
                const offsetX = Math.sin(sun.azimuth) * shadowFactor * multiplier;
                const offsetY = Math.cos(sun.azimuth) * shadowFactor * multiplier;

                map.setPaintProperty('shadows-ground', 'fill-extrusion-opacity', 0.5);
                map.setPaintProperty('shadows-ground', 'fill-extrusion-translate', [offsetX, offsetY]);
                
                const brightness = Math.max(50, Math.min(220, altitudeDeg * 5));
                map.setPaintProperty('3d-buildings', 'fill-extrusion-color', `rgb(${brightness},${brightness},${brightness+30})`);
            } else {
                map.setPaintProperty('shadows-ground', 'fill-extrusion-opacity', 0);
                map.setPaintProperty('3d-buildings', 'fill-extrusion-color', '#111');
            }
        }

        function marcarAparcamiento() {
            const c = map.getCenter();
            new maplibregl.Marker({ color: '#e94560' }).setLngLat(c).addTo(map);
        }

        navigator.geolocation.getCurrentPosition(
            pos => initMap(pos.coords.latitude, pos.coords.longitude),
            err => initMap(41.6176, 0.6201)
        );
    </script>
</body>
</html>
