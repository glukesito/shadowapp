<!DOCTYPE html>
<html>
<head>
    <title>ShadowApp 3D 🚗❄️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <script src="https://cdn.osmbuildings.org/4.1.1/OSMBuildings.js"></script>
    
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        #map { height: 65vh; width: 100%; background: #333; } /* Fondo gris oscuro, no negro */
        .controls { height: 35vh; padding: 20px; text-align: center; background: #16213e; }
        input[type=range] { width: 90%; margin: 15px 0; accent-color: #e94560; }
        .btn-aparcar { background: #e94560; border: none; padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="controls">
        <h2 id="time-display">Hora: Ahora</h2>
        <input type="range" id="hour-slider" min="0" max="24" value="0" step="0.5">
        <p id="status-text">Cargando sombras...</p>
        <button class="btn-aparcar">📍 He aparcado aquí</button>
    </div>

    <script>
        const slider = document.getElementById('hour-slider');
        const timeDisplay = document.getElementById('time-display');
        const status = document.getElementById('status-text');
        let osmb;

        // Ubicación por defecto (Madrid) por si el GPS falla
        let lat = 40.4167;
        let lon = -3.7033;

        function startApp(userLat, userLon) {
            if (osmb) return; // Evitar que se cree dos veces

            osmb = new OSMBuildings({
                container: 'map',
                position: { latitude: userLat, longitude: userLon },
                zoom: 18,
                minZoom: 15,
                effects: ['shadows'],
                attribution: '© OSMBuildings'
            });

            // Usamos un estilo de mapa más claro para ver si cargan las calles
            osmb.addTiles('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

            function updateTime() {
                let t = new Date();
                t.setHours(t.getHours() + parseFloat(slider.value));
                timeDisplay.innerText = `En +${slider.value}h (${t.getHours()}:${t.getMinutes() < 10 ? '0' : ''}${t.getMinutes()})`;
                osmb.date(t);
            }

            slider.addEventListener('input', updateTime);
            updateTime();
            status.innerText = "¡Mapa 3D listo! Mueve el slider.";
        }

        // Intentar obtener GPS
        navigator.geolocation.getCurrentPosition(
            pos => {
                startApp(pos.coords.latitude, pos.coords.longitude);
            },
            err => {
                console.warn("GPS denegado, cargando ubicación por defecto");
                startApp(lat, lon); // Madrid
            },
            { timeout: 5000 }
        );

        // Si en 6 segundos no ha pasado nada, forzamos carga
        setTimeout(() => { if(!osmb) startApp(lat, lon); }, 6000);
    </script>
</body>
</html>
