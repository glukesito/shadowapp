<!DOCTYPE html>
<html lang="es">
<head>
    <title>ShadowApp Pro v7.0 🌍🌦️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>

    <style>
        :root { --accent: #e94560; --bg: #1a1a2e; --panel: #16213e; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 65vh; width: 100%; }
        
        .ui-panel { 
            height: 35vh; padding: 20px; background: var(--panel); 
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box;
        }

        .weather-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); padding: 8px 15px;
            border-radius: 20px; font-size: 12px; backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .info-card { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px; text-align: center; }
        h2 { margin: 0; font-size: 24px; letter-spacing: -1px; }
        
        input[type=range] { 
            width: 100%; margin: 15px 0; cursor: pointer;
            accent-color: var(--accent);
        }

        .btn-main { 
            background: var(--accent); border: none; padding: 16px; 
            border-radius: 15px; color: white; font-weight: 700; 
            font-size: 16px; transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .btn-main:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="weather-badge" id="weather-info">☀️ Despejado (Simulado)</div>
    
    <div class="ui-panel">
        <div class="info-card">
            <h2 id="time-display">--:--</h2>
            <div id="sun-details" style="font-size: 12px; opacity: 0.7; margin-top: 4px;">Detectando ubicación...</div>
        </div>
        
        <input type="range" id="hour-slider" min="-12" max="12" value="0" step="0.2">
        
        <button class="btn-main" onclick="saveParking()">📍 MARCAR POSICIÓN DEL COCHE</button>
    </div>

    <script>
        // Variables de estado
        let map, userCoords = { lat: 41.6176, lon: 0.6201 }; // Default: Lleida
        const slider = document.getElementById('hour-slider');
        const timeDisplay = document.getElementById('time-display');
        const sunDetails = document.getElementById('sun-details');

        // 1. Inicializar Mapa con Estilo Limpio (estilo Apple/Google)
        function init() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/liberty', // Estilo más "Apple Maps"
                center: [userCoords.lon, userCoords.lat],
                zoom: 17,
                pitch: 60,
                antialias: true
            });

            map.on('load', () => {
                setupLayers();
                updateShadows();
            });

            slider.addEventListener('input', updateShadows);
        }

        // 2. Capas de Precisión (Edificios, Áreas Verdes y Parkings)
        function setupLayers() {
            // Sombra proyectada (la "mancha" negra)
            map.addLayer({
                'id': 'ground-shadows',
                'source': 'openmaptiles',
                'source-layer': 'building',
                'type': 'fill-extrusion',
                'paint': {
                    'fill-extrusion-color': '#000',
                    'fill-extrusion-opacity': 0.45,
                    'fill-extrusion-height': 0.1,
                    'fill-extrusion-base': 0
                }
            });

            // Edificios 3D
            map.addLayer({
                'id': '3d-buildings',
                'source': 'openmaptiles',
                'source-layer': 'building',
                'type': 'fill-extrusion',
                'paint': {
                    'fill-extrusion-color': '#e0e0e0',
                    'fill-extrusion-height': ['get', 'render_height'],
                    'fill-extrusion-base': ['get', 'render_min_height'],
                    'fill-extrusion-opacity': 0.85
                }
            });

            // Áreas Verdes (Vegetación/Parques)
            map.addLayer({
                'id': 'vegetation',
                'source': 'openmaptiles',
                'source-layer': 'landuse',
                'filter': ['in', 'class', 'park', 'grass', 'wood'],
                'type': 'fill',
                'paint': { 'fill-color': '#2d5a27', 'fill-opacity': 0.3 }
            }, 'ground-shadows');
        }

        // 3. Motor de Sombras Global y Tiempo
        function updateShadows() {
            const now = new Date();
            // Ajuste según el slider (permite ver pasado y futuro)
            now.setMinutes(now.getMinutes() + parseFloat(slider.value) * 60);
            
            const sun = SunCalc.getPosition(now, userCoords.lat, userCoords.lon);
            const altitude = sun.altitude * (180 / Math.PI);
            
            // Reloj dinámico
            timeDisplay.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            sunDetails.innerText = `Sol a ${altitude.toFixed(1)}° de altura | Lat: ${userCoords.lat.toFixed(3)}`;

            if (sun.altitude > 0) {
                const shadowLength = Math.min(1 / Math.tan(sun.altitude), 8);
                const mult = 25; // Factor de precisión visual
                const offsetX = Math.sin(sun.azimuth) * shadowLength * mult;
                const offsetY = Math.cos(sun.azimuth) * shadowLength * mult;

                map.setPaintProperty('ground-shadows', 'fill-extrusion-opacity', 0.45);
                map.setPaintProperty('ground-shadows', 'fill-extrusion-translate', [offsetX, offsetY]);
                
                // Color de edificio según luz solar
                const light = Math.max(100, Math.min(255, altitude * 4));
                map.setPaintProperty('3d-buildings', 'fill-extrusion-color', `rgb(${light}, ${light}, ${light+20})`);
            } else {
                map.setPaintProperty('ground-shadows', 'fill-extrusion-opacity', 0);
                map.setPaintProperty('3d-buildings', 'fill-extrusion-color', '#1a1a2e');
            }
        }

        function saveParking() {
            const pos = map.getCenter();
            new maplibregl.Marker({ color: '#e94560' }).setLngLat(pos).addTo(map);
            alert("Ubicación del coche guardada. Analizando sombra...");
        }

        // GPS con gestión de errores
        navigator.geolocation.getCurrentPosition(
            p => {
                userCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
                init();
            },
            () => {
                console.log("Usando ubicación por defecto");
                init();
            }
        );
    </script>
</body>
</html>
